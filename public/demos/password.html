<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="bg-[#080808] text-gray-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

  <div
    x-data="{
      password: '',
      length: 16,
      upper: true,
      lower: true,
      numbers: true,
      symbols: true,
      copied: false,
      get strength() {
        const p = this.password;
        let s = 0;
        if (p.length >= 8) s++;
        if (p.length >= 16) s++;
        if (/[A-Z]/.test(p)) s++;
        if (/[a-z]/.test(p)) s++;
        if (/[0-9]/.test(p)) s++;
        if (/[^A-Za-z0-9]/.test(p)) s++;
        return s;
      },
      get strengthLabel() {
        const labels = ['', 'Very Weak', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
        return labels[Math.min(this.strength, 6)];
      },
      get strengthColor() {
        const s = this.strength;
        if (s <= 1) return 'bg-red-500';
        if (s <= 2) return 'bg-blue-500';
        if (s <= 3) return 'bg-yellow-500';
        if (s <= 4) return 'bg-lime-500';
        return 'bg-emerald-500';
      },
      generate() {
        const U = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const L = 'abcdefghijklmnopqrstuvwxyz';
        const N = '0123456789';
        const S = '!@#$%^&*()-_=+[]{}|;:,.<>?';
        let chars = '';
        if (this.upper) chars += U;
        if (this.lower) chars += L;
        if (this.numbers) chars += N;
        if (this.symbols) chars += S;
        if (!chars) { this.password = ''; return; }
        const arr = new Uint32Array(this.length);
        crypto.getRandomValues(arr);
        this.password = Array.from(arr).map(v => chars[v % chars.length]).join('');
      },
      async copy() {
        if (!this.password) return;
        await navigator.clipboard.writeText(this.password);
        this.copied = true;
        setTimeout(() => this.copied = false, 2000);
      }
    }"
    x-init="generate()"
    class="w-full max-w-sm flex flex-col gap-6"
  >
    <div class="text-center">
      <h1 class="text-2xl font-bold mb-1">Password Generator</h1>
      <p class="text-zinc-500 text-sm">Strong, random, secure passwords</p>
    </div>

    <!-- Password display -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 flex items-center gap-3">
      <span
        class="flex-1 font-mono text-base break-all leading-relaxed"
        :class="password ? 'text-blue-400' : 'text-zinc-600'"
        x-text="password || 'Select at least one character type'"
      ></span>
      ></span>
      <button @click="copy()" class="flex-shrink-0 text-zinc-400 hover:text-white transition-colors p-1">
        <template x-if="!copied">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2" stroke-linecap="round"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-width="2" stroke-linecap="round"/></svg>
        </template>
        <template x-if="copied">
          <svg class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </template>
      </button>
    </div>

    <!-- Strength meter -->
    <div x-show="password" class="space-y-1.5">
      <div class="flex justify-between items-center">
        <span class="text-xs text-zinc-500">Strength</span>
        <span class="text-xs font-medium" :class="strength >= 5 ? 'text-emerald-400' : strength >= 4 ? 'text-lime-400' : strength >= 3 ? 'text-yellow-400' : 'text-red-400'" x-text="strengthLabel"></span>
      </div>
      <div class="flex gap-1">
        <template x-for="i in 6" :key="i">
          <div class="flex-1 h-1 rounded-full transition-all" :class="i <= strength ? strengthColor : 'bg-zinc-800'"></div>
        </template>
      </div>
    </div>

    <!-- Length slider -->
    <div class="space-y-2">
      <div class="flex justify-between items-center">
        <label class="text-sm text-zinc-400">Length</label>
        <span class="text-sm font-mono text-white" x-text="length"></span>
      </div>
      <input
        type="range" min="6" max="64" step="1"
        x-model.number="length"
        @input="generate()"
        class="w-full accent-blue-500"
      />
    </div>

    <!-- Options -->
    <div class="grid grid-cols-2 gap-2">
      <template x-for="[key, label] in [['upper','Uppercase A–Z'],['lower','Lowercase a–z'],['numbers','Numbers 0–9'],['symbols','Symbols !@#$']]" :key="key">
        <label class="flex items-center gap-2.5 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2.5 cursor-pointer hover:border-zinc-600 transition-colors">
          <input
            type="checkbox"
            :checked="$data[key]"
            @change="$data[key] = $event.target.checked; generate()"
            class="accent-blue-500 w-4 h-4"
          />
          <span class="text-xs text-zinc-300" x-text="label"></span>
        </label>
      </template>
    </div>

    <!-- Generate button -->
    <button
      @click="generate()"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all"
    >
      Generate New Password
    </button>
  </div>

  <footer class="fixed bottom-4 text-xs text-zinc-800">Made with Quorum Protocol · Powered by Locus</footer>
</body>
</html>
